<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Library</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#f5f7fb;
    color:#333;
}

.header{
    background:white;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    position:sticky;
    top:0;
    z-index:100;
}

.header h1{
    margin-bottom:15px;
}

.toolbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input,select{
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
}

#search{
    flex:1;
    min-width:250px;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.source-section{
    margin-bottom:40px;
}

.source-title{
    font-size:24px;
    margin-bottom:15px;
}

.course-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:16px;
}

.course-card{
    background:white;
    border-radius:14px;
    padding:18px;
    cursor:pointer;
    transition:.2s;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.course-card:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 20px rgba(0,0,0,.12);
}

.course-name{
    font-size:18px;
    font-weight:600;
    margin-bottom:10px;
}

.course-meta{
    color:#666;
    font-size:13px;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    z-index:999;
}

.modal-content{
    background:white;
    width:min(900px,95%);
    max-height:90vh;
    overflow:auto;
    margin:30px auto;
    border-radius:16px;
    padding:25px;
}

.close-btn{
    float:right;
    border:none;
    background:#efefef;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.module{
    margin-top:20px;
}

.module h3{
    margin-bottom:10px;
}

.lesson{
    display:block;
    text-decoration:none;
    color:#333;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
    background:#f8f9fc;
}

.lesson:hover{
    background:#eaf1ff;
}

.lesson-title{
    font-weight:500;
}

.empty{
    text-align:center;
    padding:40px;
    color:#777;
}

.badge{
    display:inline-block;
    background:#eef3ff;
    color:#4d6bff;
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    margin-top:10px;
}

</style>
</head>
<body>

<div class="header">

    <h1>🎬 Video Library</h1>

    <div class="toolbar">

        <input
            id="search"
            placeholder="Search course, module, lesson..."
        >

        <select id="sourceFilter">
            <option value="">All Sources</option>
        </select>

    </div>

</div>

<div class="container">
    <div id="content"></div>
</div>

<div class="modal" id="courseModal">
    <div class="modal-content">

        <button class="close-btn" onclick="closeModal()">
            Close
        </button>

        <h2 id="modalTitle"></h2>

        <div id="modalBody"></div>

    </div>
</div>

<script>

let allData=[];

Papa.parse("videos.csv",{
    download:true,
    header:true,
    skipEmptyLines:true,
    complete:function(result){

        allData=result.data;

        loadFilters();
        renderCourses();
    }
});

function loadFilters(){

    const sources=[
        ...new Set(
            allData.map(x=>x.Sumber)
        )
    ];

    const ddl=document.getElementById("sourceFilter");

    sources.sort().forEach(s=>{

        ddl.innerHTML += `
        <option value="${s}">
            ${s}
        </option>
        `;
    });
}

document
.getElementById("search")
.addEventListener("input",renderCourses);

document
.getElementById("sourceFilter")
.addEventListener("change",renderCourses);

function renderCourses(){

    const keyword=
        document
        .getElementById("search")
        .value
        .toLowerCase();

    const sourceFilter=
        document
        .getElementById("sourceFilter")
        .value;

    let filtered=allData.filter(v=>{

        const text=`
            ${v.NamaKursus}
            ${v.Modul}
            ${v.Lesson}
        `.toLowerCase();

        const keywordMatch=
            text.includes(keyword);

        const sourceMatch=
            !sourceFilter ||
            v.Sumber===sourceFilter;

        return keywordMatch && sourceMatch;
    });

    const grouped={};

    filtered.forEach(item=>{

        if(!grouped[item.Sumber]){
            grouped[item.Sumber]={};
        }

        if(!grouped[item.Sumber][item.NamaKursus]){
            grouped[item.Sumber][item.NamaKursus]=[];
        }

        grouped[item.Sumber][item.NamaKursus].push(item);
    });

    let html="";

    Object.keys(grouped)
    .sort()
    .forEach(source=>{

        html += `
        <div class="source-section">

            <div class="source-title">
                📚 ${source}
            </div>

            <div class="course-grid">
        `;

        Object.keys(grouped[source])
        .sort()
        .forEach(course=>{

            const videos=
                grouped[source][course];

            const modules=
                new Set(
                    videos.map(v=>v.Modul)
                ).size;

            html += `
            <div
                class="course-card"
                onclick="openCourse('${encodeURIComponent(course)}','${encodeURIComponent(source)}')"
            >

                <div class="course-name">
                    ${course}
                </div>

                <div class="course-meta">
                    ${videos.length} Lessons
                </div>

                <div class="badge">
                    ${modules} Modules
                </div>

            </div>
            `;
        });

        html += `
            </div>
        </div>
        `;
    });

    if(html===""){
        html=`
        <div class="empty">
            No data found
        </div>
        `;
    }

    document
    .getElementById("content")
    .innerHTML=html;
}

function openCourse(course,source){

    course=decodeURIComponent(course);
    source=decodeURIComponent(source);

    const videos=
        allData.filter(v=>
            v.NamaKursus===course &&
            v.Sumber===source
        );

    const modules={};

    videos.forEach(v=>{

        if(!modules[v.Modul]){
            modules[v.Modul]=[];
        }

        modules[v.Modul].push(v);
    });

    let html="";

    Object.keys(modules)
    .sort()
    .forEach(module=>{

        html += `
        <div class="module">

            <h3>${module}</h3>
        `;

        modules[module].forEach(video=>{

            html += `
            <a
                class="lesson"
                href="${video.URL}"
                target="_blank"
            >

                <div class="lesson-title">
                    ▶ ${video.Lesson}
                </div>

            </a>
            `;
        });

        html += `
        </div>
        `;
    });

    document.getElementById("modalTitle").innerHTML=
        course;

    document.getElementById("modalBody").innerHTML=
        html;

    document.getElementById("courseModal").style.display=
        "block";
}

function closeModal(){

    document.getElementById("courseModal").style.display=
        "none";
}

window.onclick=function(event){

    const modal=
        document.getElementById("courseModal");

    if(event.target===modal){
        closeModal();
    }
};

</script>

</body>
</html>
